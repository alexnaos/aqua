[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs

; Важно для корректного поиска вложенных зависимостей
lib_ldf_mode = deep+

lib_deps = 
    ; Библиотеки GyverLibs для Settings
    gyverlibs/Settings @ ^1.0
    gyverlibs/GyverDB @ ^1.0
    knolleary/PubSubClient @ ^2.8
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.5